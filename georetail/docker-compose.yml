version: "3.9"

# GeoRetail — todos los servicios en un solo comando: docker-compose up
#
# Servicios:
#   postgres  → base de datos principal (PostgreSQL + PostGIS + pgvector)
#   redis     → caché y cola de tareas (mensajes entre backend y worker)
#   backend   → API FastAPI
#   worker    → Celery (procesa PDFs y scores en segundo plano)
#   frontend  → Next.js

services:

  # ─── Base de datos ─────────────────────────────────────────────────────────
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: georetail_postgres
    environment:
      POSTGRES_DB:       georetail
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Ejecuta el schema SQL automáticamente la primera vez que arranca
      - ./backend/db/migraciones:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d georetail"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Cache y cola de mensajes ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: georetail_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Backend FastAPI ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: georetail_backend
    env_file: .env
    environment:
      DATABASE_URL:           postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/georetail
      REDIS_URL:              redis://redis:6379
      CELERY_BROKER_URL:      redis://redis:6379/1
      CELERY_RESULT_BACKEND:  redis://redis:6379/2
      GOSOM_BASE_URL:         http://gosom-scraper:8080
      CSV_DIR:                /data/csv/_cleaned
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app                     # hot reload (recarga automática) en desarrollo
      - models_data:/data/models           # modelos XGBoost entrenados
      - exports_data:/data/exports         # PDFs generados
      - ../CSV:/data/csv:ro                # CSVs de Open Data BCN (aforaments, etc.)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gosom-scraper:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Worker Celery (tareas en segundo plano) ────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: georetail_worker
    env_file: .env
    environment:
      DATABASE_URL:           postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/georetail
      REDIS_URL:              redis://redis:6379
      CELERY_BROKER_URL:      redis://redis:6379/1
      CELERY_RESULT_BACKEND:  redis://redis:6379/2
      GOSOM_BASE_URL:         http://gosom-scraper:8080
      CSV_DIR:                /data/csv/_cleaned
    volumes:
      - ./backend:/app
      - models_data:/data/models
      - exports_data:/data/exports
      - ../CSV:/data/csv:ro                # CSVs de Open Data BCN
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gosom-scraper:
        condition: service_started
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2

  # ─── gosom Google Maps scraper (Go) ────────────────────────────────────────
  # Modo -web: sin autenticación, sin API key requerida.
  # El backend accede vía http://gosom-scraper:8080 (service discovery Docker).
  # -lang es    → resultados en español (Barcelona)
  # -depth 1    → una página de resultados por query (~20 lugares)
  gosom-scraper:
    image: gosom/google-maps-scraper
    container_name: georetail_gosom
    ports:
      - "8080:8080"
    volumes:
      - gosom_data:/gmapsdata
    command: ["-data-folder", "/gmapsdata", "-web", "-lang", "es", "-depth", "1"]
    restart: unless-stopped

  # ─── Frontend Next.js ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: georetail_frontend
    env_file: .env
    environment:
      NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN}
      NEXT_PUBLIC_API_URL:      http://localhost:8000
      NEXT_PUBLIC_USE_MOCK:     ${NEXT_PUBLIC_USE_MOCK:-true}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src            # hot reload solo del código fuente
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  models_data:
  exports_data:
  gosom_data:
